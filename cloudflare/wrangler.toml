name = "nanoclaw-event-driven"
main = "src/index.ts"
compatibility_date = "2026-03-03"
compatibility_flags = ["nodejs_compat"]

# Configure per environment in your Cloudflare account.
# This repository intentionally does not commit real IDs.

[vars]
APP_ENV = "dev"
AGENT_RUNTIME_MODE = "stub"
# AGENT_RUNTIME_HTTP_URL = "https://runtime.example.com/execute"
AGENT_QUEUE_MAX_ATTEMPTS = "5"
OUTBOUND_MODE = "stub"
# OUTBOUND_HTTP_URL = "https://outbound.example.com/send"
OUTBOUND_ALLOWED_CHANNELS = "slack,telegram,discord"
OUTBOUND_QUEUE_MAX_ATTEMPTS = "5"
TIMEZONE = "UTC"

[triggers]
# Safety sweep. Primary execution path is Durable Object alarms.
crons = ["*/1 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "nanoclaw"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[durable_objects.bindings]]
name = "TENANT_ORCHESTRATOR"
class_name = "TenantOrchestrator"

[[queues.producers]]
binding = "AGENT_RUN_QUEUE"
queue = "nanoclaw-agent-runs"

[[queues.producers]]
binding = "OUTBOUND_QUEUE"
queue = "nanoclaw-outbound"

[[queues.consumers]]
queue = "nanoclaw-agent-runs"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "nanoclaw-outbound"
max_batch_size = 20
max_batch_timeout = 5

[[r2_buckets]]
binding = "TENANT_FILES"
bucket_name = "nanoclaw-tenant-files"

[[services]]
binding = "AGENT_RUNTIME"
service = "nanoclaw-agent-runtime"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TenantOrchestrator"]

[env.staging.vars]
APP_ENV = "staging"
AGENT_RUNTIME_MODE = "service"
AGENT_QUEUE_MAX_ATTEMPTS = "5"
OUTBOUND_MODE = "http"
OUTBOUND_ALLOWED_CHANNELS = "slack,telegram,discord"
OUTBOUND_QUEUE_MAX_ATTEMPTS = "8"
TIMEZONE = "UTC"

[env.prod.vars]
APP_ENV = "prod"
AGENT_RUNTIME_MODE = "service"
AGENT_QUEUE_MAX_ATTEMPTS = "5"
OUTBOUND_MODE = "http"
OUTBOUND_ALLOWED_CHANNELS = "slack,telegram,discord"
OUTBOUND_QUEUE_MAX_ATTEMPTS = "8"
TIMEZONE = "UTC"

# Future phases:
# - Add queue producer/consumer bindings for agent run jobs
# - Add R2 buckets for tenant file/session artifacts
# - Add Containers binding for agent runtime execution

