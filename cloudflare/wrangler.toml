name = "nanoclaw-event-driven"
main = "src/index.ts"
compatibility_date = "2026-03-03"
compatibility_flags = ["nodejs_compat"]

# Configure per environment in your Cloudflare account.
# This repository intentionally does not commit real IDs.

[vars]
APP_ENV = "dev"
AGENT_RUNTIME_MODE = "stub"
# AGENT_RUNTIME_HTTP_URL = "https://runtime.example.com/execute"
AGENT_QUEUE_MAX_ATTEMPTS = "5"
TIMEZONE = "UTC"

[triggers]
# Safety sweep. Primary execution path is Durable Object alarms.
crons = ["*/1 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "nanoclaw"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[durable_objects.bindings]]
name = "TENANT_ORCHESTRATOR"
class_name = "TenantOrchestrator"

[[queues.producers]]
binding = "AGENT_RUN_QUEUE"
queue = "nanoclaw-agent-runs"

[[queues.consumers]]
queue = "nanoclaw-agent-runs"
max_batch_size = 10
max_batch_timeout = 5

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TenantOrchestrator"]

# Future phases:
# - Add queue producer/consumer bindings for agent run jobs
# - Add R2 buckets for tenant file/session artifacts
# - Add Containers binding for agent runtime execution

